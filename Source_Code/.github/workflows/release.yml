name: Build and Release Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_desktop:
        description: "Build Desktop App"
        required: false
        default: "false"
      build_android:
        description: "Build Android APK"
        required: false
        default: "false"
      publish_release:
        description: "Publish build artifacts to builds repo release"
        required: false
        default: "false"
      release_tag:
        description: "Release tag for manual publish (example: v2.6.2)"
        required: false
        default: ""

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_desktop == 'true' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-win-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: node-modules-win-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-win-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-win-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          DATABASE_URL: "postgresql://localhost:5432/dummy"
          DIRECT_URL: "postgresql://localhost:5432/dummy"
        run: pnpm install --no-frozen-lockfile

      - name: Ensure Electron cache dirs exist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:LOCALAPPDATA\electron\Cache" | Out-Null
          New-Item -ItemType Directory -Force "$env:LOCALAPPDATA\electron-builder\Cache" | Out-Null

      - name: Build Desktop App
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
        run: pnpm exec electron-builder --publish never

      - name: Validate desktop release files
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
        shell: bash
        run: |
          if ! compgen -G "dist/*.exe" > /dev/null; then
            echo "Missing required desktop installer (dist/*.exe)."
            exit 1
          fi

          if [ ! -f "dist/latest.yml" ]; then
            echo "Missing required updater manifest (dist/latest.yml)."
            exit 1
          fi

      - name: Publish desktop release assets
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ secrets.BUILDS_REPO_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "release_tag is required for manual publish."
            exit 1
          fi

          EXE_FILE=$(ls dist/*.exe | head -1)
          LATEST_FILE="dist/latest.yml"
          BLOCKMAP_FILE=$(ls dist/*.blockmap 2>/dev/null | head -1 || true)

          gh release create "$TAG" \
            --repo ku28/erpflowstudios-app-builds \
            --title "$TAG" \
            --notes "Release" \
            "$EXE_FILE" \
            "$LATEST_FILE" \
            ${BLOCKMAP_FILE:+$BLOCKMAP_FILE} 2>/dev/null \
          || gh release upload "$TAG" \
            --repo ku28/erpflowstudios-app-builds \
            --clobber \
            "$EXE_FILE" \
            "$LATEST_FILE" \
            ${BLOCKMAP_FILE:+$BLOCKMAP_FILE}

  build-android:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-linux-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: node-modules-linux-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          DATABASE_URL: "postgresql://localhost:5432/dummy"
          DIRECT_URL: "postgresql://localhost:5432/dummy"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm install --no-frozen-lockfile

      - name: Patch Capacitor speech plugin for AGP compatibility
        run: node scripts/patch-capacitor-speech-gradle.js

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Validate Android APK
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
        shell: bash
        run: |
          if ! compgen -G "android/app/build/outputs/apk/release/*.apk" > /dev/null; then
            echo "Missing required Android APK (android/app/build/outputs/apk/release/*.apk)."
            exit 1
          fi

      - name: Publish Android release asset
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ secrets.BUILDS_REPO_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "release_tag is required for manual publish."
            exit 1
          fi

          APK_FILE=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          RELEASE_APK="$RUNNER_TEMP/ERPFlowStudios.apk"

          cp -f "$APK_FILE" "$RELEASE_APK"

          gh release create "$TAG" \
            --repo ku28/erpflowstudios-app-builds \
            --title "$TAG" \
            --notes "Release" \
            "$RELEASE_APK" 2>/dev/null \
          || gh release upload "$TAG" \
            --repo ku28/erpflowstudios-app-builds \
            --clobber \
            "$RELEASE_APK"

  cleanup-workflow-logs:
    name: Cleanup workflow logs (1 day retention)
    if: ${{ always() }}
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete logs older than 1 day
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'release.yml';
            const cutoffMs = Date.now() - 24 * 60 * 60 * 1000;
            const currentRunId = Number(context.runId);
            const perPage = 100;
            let page = 1;
            let deletedCount = 0;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                per_page: perPage,
                page,
              });

              const runs = data.workflow_runs || [];
              if (runs.length === 0) break;

              for (const run of runs) {
                if (run.id === currentRunId) continue;

                const createdAtMs = new Date(run.created_at).getTime();
                if (createdAtMs >= cutoffMs) continue;

                try {
                  await github.rest.actions.deleteWorkflowRunLogs({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                  deletedCount += 1;
                } catch (error) {
                  core.warning(`Could not delete logs for run ${run.id}: ${error.message}`);
                }
              }

              if (runs.length < perPage) break;
              page += 1;
            }

            core.info(`Deleted logs for ${deletedCount} run(s) older than 1 day.`);

