<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Flow Studios</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            user-select: none;
            background: #000818
        }

        /* Video background */
        .bg-video {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden
        }

        .p {
            position: absolute;
            border-radius: 50%;
            background: rgba(100, 200, 255, .6);
            box-shadow: 0 0 5px rgba(0, 180, 255, .5);
            animation: floatUp linear infinite;
            opacity: 0
        }

        .container {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            padding-bottom: 18px
        }

        /* === LOADING === */
        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 8px;
            opacity: 0;
            transform: scale(.7);
            transform-origin: center bottom;
            animation: fadeSlideUpScaled .65s ease-out 1.6s forwards
        }

        .init-text {
            font-size: 12.5px;
            font-style: italic;
            background: linear-gradient(135deg, #4a8eff, #0044aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: .5px
        }

        .dots {
            display: flex;
            gap: 11px;
            align-items: center
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00e0ff, #009aff);
            box-shadow: 0 0 9px rgba(0, 215, 255, .9), 0 0 3px rgba(0, 200, 255, .5);
            animation: dotCycle 1.4s ease-in-out infinite
        }

        .dot:nth-child(1) {
            animation-delay: 0s
        }

        .dot:nth-child(2) {
            animation-delay: .24s
        }

        .dot:nth-child(3) {
            animation-delay: .48s
        }

        .dot:nth-child(4) {
            animation-delay: .72s
        }

        .version {
            font-size: 10.5px;
            background: linear-gradient(135deg, #3a7edd, #002d7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
            opacity: 0;
            animation: fadeIn .5s ease-out 2s forwards
        }

        /* === KEYFRAMES === */
        @keyframes fadeIn {
            to {
                opacity: 1
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeSlideUpScaled {
            from {
                opacity: 0;
                transform: scale(.7) translateY(10px)
            }

            to {
                opacity: 1;
                transform: scale(.7) translateY(0)
            }
        }

        @keyframes dotCycle {

            0%,
            100% {
                transform: scale(.55) translateY(0);
                opacity: .25
            }

            50% {
                transform: scale(1.35) translateY(-4px);
                opacity: 1
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(var(--dx1, 0px));
                opacity: 0
            }

            8% {
                opacity: var(--op, .45)
            }

            88% {
                opacity: var(--op, .25)
            }

            100% {
                transform: translateY(var(--dy, -90px)) translateX(var(--dx2, 0px));
                opacity: 0
            }
        }
    </style>
</head>

<body>

    <video class="bg-video" autoplay muted playsinline>
        <source src="public/splash-screen.mp4" type="video/mp4">
    </video>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="loading-section">
            <div class="version" id="versionText">Version</div>
        </div>
    </div>

    <script>
        (function () {
            var versionEl = document.getElementById('versionText');
            var params = new URLSearchParams(window.location.search);
            var version = params.get('version');
            if (versionEl && version) {
                versionEl.textContent = 'Version ' + version;
            }

            var w = document.getElementById('particles');
            for (var i = 0; i < 30; i++) {
                var e = document.createElement('div'); e.className = 'p';
                var sz = (Math.random() * 2.4 + .8).toFixed(1),
                    dur = (Math.random() * 5 + 4).toFixed(1),
                    del = (Math.random() * 7).toFixed(1),
                    op = (Math.random() * .28 + .18).toFixed(2);
                e.style.cssText = [
                    'left:' + (Math.random() * 100).toFixed(1) + '%',
                    'bottom:' + (Math.random() * 60).toFixed(1) + '%',
                    'width:' + sz + 'px', 'height:' + sz + 'px',
                    '--dx1:' + ((Math.random() - .5) * 22).toFixed(1) + 'px',
                    '--dx2:' + ((Math.random() - .5) * 55).toFixed(1) + 'px',
                    '--dy:-' + (Math.random() * 120 + 55).toFixed(0) + 'px',
                    '--op:' + op,
                    'animation-duration:' + dur + 's',
                    'animation-delay:' + del + 's'
                ].join(';');
                w.appendChild(e);
            }
        })();
    </script>
</body>

</html>
